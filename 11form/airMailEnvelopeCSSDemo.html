<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<!-- envelope.html - Showing off CSS tricks
     Original code from: http://red-team-design.com/html5-css3-envelope-contact-form/
-->
<style>
#form-wrapper {
   width: 700px;
   height: 400px;
   margin: 0 auto;  /* center left and right using auto */
   padding: 20px;    
   position: relative; 
   border: 1px solid #ddd;  
   background-color: #fff;
   /* use gradient to make red/white/blue stripes */
   background-image: repeating-linear-gradient(135deg,#844049,#844049,
                     #fff 50px, #fff 150px,
                     #3e4996 100px, #3e4996,
                     #fff 200px, #fff 300px);  
}

#form-wrapper:before, 
#form-wrapper:after {
   z-index: -1;
   position: absolute;
   content: "";
   bottom: 15px;
   left: 10px;
   width: 50%;
   top: 80%;
   max-width:300px;
   background: rgba(0, 0, 0, 0.7);
   box-shadow: 0 15px 10px rgba(0, 0, 0, 0.7);
   transform: rotate(-45deg);  /* -3deg */
}

#form-wrapper:after {
   transform: rotate(3deg);
   right: 10px;
   left: auto;  
}   

#form-wrapper .button {
    float: right;
    margin: 10px 0 0 0;
    padding: 7px 15px;
    cursor: pointer;   
    color: #fff;
    font: 900 13px Tahoma, Verdana, Arial, sans-serif;
    text-transform: uppercase;
    overflow: visible; /* IE6/7 fix */
    border: 0;     
    background-color: #7089b3;
    background-image: linear-gradient(#a5b8da, #7089b3);
    border-radius: 3px;    
    text-shadow: 0 1px 0 rgba(0,0,0,.9); /* 90% opacity */
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.5), 0 3px 0 rgba(0, 0, 0, 0.7);
}

#form-wrapper .button:hover {
    background-color: #a5b8da;
    background-image: linear-gradient(#7089b3, #a5b8da);    
}

#form-wrapper .button:active {
    background: #64799e;
    position: relative;
    top: 2px;
    box-shadow: 0 0 3px rgba(0, 0, 0, 0.7) inset; 
}

#form-wrapper form
{
    background: #fff;
    height: 400px;
}

#form-wrapper #form-inner
{
    margin: 0 auto;
    padding: 35px 0;
    width: 545px;
}
	
#form-wrapper label
{
    font: bold 18px/25px Corbel, Arial, Helvetica; 
    text-shadow: 0 1px 0 #fff, 0 2px 0 #ccc;
    float: left; 
    margin-right: 10px; 
    width: 120px; 
}

#form-wrapper .input
{
    font: 15px Arial, Helvetica; 
    padding: 5px;
    margin: 0 0 20px 0;
    border: 1px solid #b9bdc1; 
    width: 400px; 
    color: #797979;
    
    -moz-box-shadow: 0 2px 4px #bbb inset;
    -webkit-box-shadow: 0 2px 4px #bbb inset;
    box-shadow: 0 2px 4px #bbb inset;
    
    -moz-border-radius: 3px;
    -webkit-border-radius: 3px;
    border-radius: 3px;
    
}

#form-wrapper .input:focus
{
    background-color: #E7E8E7;
    outline: 0;
}

#form-wrapper .textarea
{
    height:150px;	
}

   </style>
</head>
<body>
<h1> Contact Us</h1>
<div id="form-wrapper">
    <form>
        <div id="form-inner">

            <label for="name">Name:</label>
            <input type="text" class="input" id="name" placeholder="John Doe">
        
            <label for="email">Email:</label>
            <input type="email" class="input" id="email" placeholder="john.doe@email.com">
        
            <label for="message">Message:</label>
            <textarea class="input textarea" id="message" placeholder="Your message here"></textarea>    
        
             <input type="submit" class="button" value="Send message">

        </div>
    </form>
</div>

</body>
</html>
