<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>Site Organizer</title>
<style type="text/css">
body {
font-family:  Verdana, Geneva, sans-serif;
font-size:    14px;  
max-width:    700px;
}

h1 {
font-size:  130%;  
}

p {
margin:      5px;  
font-size:   110%;
}

fieldset {
border:    1px solid #000090;
  
}

fieldset div input, 
fieldset div textarea {
border:      1px solid #000090;   /* dark blue */
display:     block;
font-size:   110%;
margin:      -1.2em 0px 5px 150px;
width:       500px;
}
</style>

<body>
<h1>Site Organizer</h1>
<p>Use this page to keep track of your userID and passwords for different web sites.<br />
Keep this information safe. You don't want other people hacking into your web sites!</p>
<form id="frm1" name="form1" method="post" action="">
<fieldset> 
 <div>
    <label for="txtName1"><strong>Name of web site</strong></label>
      <input type="text" name="txtName1" id="txtName1" />
</div>
<div>
      <label for="txtURL1">URL (web address)</label>
      <input type="text" name="txtURL1" id="txtURL1" value="http://" />
</div>
<div>
      <label for="txtID1">User ID</label>
      <input type="text" name="txtID1" id="txtID1" />
</div>
<div>
      <label for="txtPassword1">Password</label>
      <input type="text" name="txtPassword1" id="txtPassword1" />
</div>
<div>
      <label for="txaNote1">Notes</label>
      <textarea name="txaNote1" id="txaNote1" cols="45" rows="5"></textarea>
</div>
 </fieldset>
</form>
