<!DOCTYPE html>
<html>
<!-- pageCentering.html - demonstrate how to center a page no matter what the resolution     
     Written:  11-25-09 - Peter Johnson http://WebExplorations.com
     Revised:  07-11-13 - PKJ Convert to HTML5
-->
<head>
   <title>Demo Centering Content</title>
   <style type="text/css">
   body {
   background:    #CECECE;              /* medium gray */
   }
   
   /* This box will enclose all of the elements of the page */
   #frame {
   max-width:        800px;             /* everything will now fit inside 800px */
   border:           5px #999999 solid; /* very light gray */ 
   background-color: #EEEEEE;
   padding:          0px 15px 0px 15px; /* give the text some breathing room */
   margin:           auto;              /* centers the block on the page */      
   }
   
   </style>
</head>
<body>
<div id="frame">
   <h1>Centering Content On Any Screen</h1>

   <!-- unordered list - bullets -->
   <ul>
      <li>First Item</li>
      <li>Second Item</li>
      <li>Third Item</li>   
   </ul>

   <p>
      This shows how to center a page no matter what the resolution. It is based
      on a maximum screen width of 800px.
   </p>
</div> <!-- end of #frame -->
</body>
</html>
