 <title>Vertical Caption</title>

 <script type="text/javascript">

 </script>
 <style type="text/css">
  body {
  background:  #EEE;
  font-size:   16px;
  font-family: helvetica, arial, sans-serif;
  }
  
  h1 {
  border:  1px #000080 solid;
  padding: 10px;
  background:  #AAA;
  color:    white;
  }
  
  h2 {
  background: #DDD;
  color:      #000080;
  padding:    10px;
  border:     1px #000080 solid;
  }
  
  li {
  margin:     1.5em 0 0 0;
  }
  
  
  td.vertical {
	border:    1px purple solid;
	float: left; 
    position: relative;
    -moz-transform: rotate(270deg);  /* FF3.5+ */        
    -o-transform: rotate(270deg);  /* Opera 10.5 */   
    -webkit-transform: rotate(270deg);  /* Saf3.1+, Chrome */              
    filter:  progid:DXImageTransform.Microsoft.BasicImage(rotation=3);  /* IE6,IE7 */          
    -ms-filter: progid:DXImageTransform.Microsoft.BasicImage(rotation=3); /* IE8 */  
    height:     125px;
    width:      25px;
    text-align: left;
    margin:     0px;
  }
  
  
  td {
  width:    25px;
  text-align: center;
  }
  
  #frame {
  max-width:   800px;
  margin:      auto;
  border:      1px solid #000080;
  padding:     20px;
  }
 </style>
</head>
<body>
<div id="frame">
<h1>Vertical Captions</h1>
<table border="1">
<tr>
  <td class="vertical">This is a test</td>
  <td class="vertical">This is another test.</td>
</tr>
</table>
<table border="1">
<tr>
<td>123</td>
<td>456</td>
</tr>
</table>
</frame>
