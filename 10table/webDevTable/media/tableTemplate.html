<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"

<html>
<!-- tableTemplate.html - Set up a basic table with CSS
     Peter Johnson
     Written:  03-11-09
     Revised:  03-11-09
-->
<head>
   <title>Table Template</title>
   
   <style type="text/css">
   body {
   background:  #EEEEEE url( ) no-repeat; 
   }   
   </style>
   
</head>
<body>
   <h1>Photo Gallery</h1>

   <h2>NOT Using align and valign attributes</h2>

   <table summary="demonstrate how various attributes are used with tabls"
          border="1" 
          cellspacing="1" 
          cellpadding="5">
          
   <!-- Heading Row -->
   <tr align>
     <th>Column One</th>
     <th>Column Two</th>
     <th>Column Three</th>   
   </tr>
   
   <!-- First row of images -->
   <tr>
     <td>
        <img src="../../../08Table/webDevTable/media/graphic/gimpLogo.png" 
             alt="GIMP logo"
             title="GIMP logo" />
     </td>
     <td>
        <img src="../../../08Table/webDevTable/media/graphic/handWithRainbowColor.jpg" 
             alt="Hand against rainbow of color"
             title="Hand against rainbow of color" />
     </td>
     <td>
         <img src="../../../08Table/webDevTable/media/graphic/past2future.gif" 
              alt="three panels showing the past, present, and future"
              title="three panels showing the past, present, and future" />
     </td>   
   </tr>
   <!-- First row of captions -->
   <tr>
     <td>GIMP</td>
     <td>Rainbow Hand<br />
         Photo from iStockPhoto.com
     </td>
     <td>Past, Present, Future</td>      
   </tr>   
   </table>
   </body>
</html>
